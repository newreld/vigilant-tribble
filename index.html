<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>COSMIC MERGE — free, forever, no catch</title>
  <link rel="stylesheet" href="merge.css" />
</head>
<body>
  <div id="stars"></div>

  <header id="hud">
    <div class="hud-box">
      <div class="hud-label">SCORE</div>
      <div class="hud-value" id="score">0</div>
    </div>
    <div class="hud-box next">
      <div class="hud-label">NEXT</div>
      <div class="hud-value" id="next-emoji">🪨</div>
    </div>
    <div class="hud-box">
      <div class="hud-label">BEST</div>
      <div class="hud-value" id="best">0</div>
    </div>
    <button id="muteBtn" aria-label="Toggle sound">🔊</button>
  </header>

  <div id="combo"></div>

  <main id="stage">
    <canvas id="game"></canvas>
  </main>

  <footer id="tagline">
    ✨ No ads. No purchases. No timers. No kidding. Just merge. ✨
  </footer>

  <!-- game over -->
  <div id="gameover" class="hidden">
    <div class="go-card">
      <div class="go-title">🌌 GALAXY FULL 🌌</div>
      <div class="go-score">Score: <b id="final-score">0</b></div>
      <div id="new-best" class="hidden">🏆 NEW BEST! 🏆</div>
      <button id="restart">PLAY AGAIN</button>
      <div class="go-note">(no "watch ad to continue" — just play again, free)</div>
    </div>
  </div>

  <script src="merge.js"></script>
</body>
</html>
