<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#06040f" />
  <title>COSMIC MERGE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="merge.css" />
</head>
<body>
  <div id="stars"></div>

  <header id="hud">
    <div class="brand">COSMIC<span>MERGE</span></div>
    <div class="hud-stats">
      <div class="hud-box">
        <div class="hud-label">SCORE</div>
        <div class="hud-value" id="score">0</div>
      </div>
      <div class="hud-box">
        <div class="hud-label">BEST</div>
        <div class="hud-value alt" id="best">0</div>
      </div>
      <div class="hud-box next">
        <div class="hud-label">NEXT</div>
        <canvas id="next-canvas" width="52" height="52"></canvas>
      </div>
      <button id="muteBtn" aria-label="Toggle sound">♪</button>
    </div>
  </header>

  <div id="combo"></div>

  <main id="stage">
    <canvas id="game"></canvas>
  </main>

  <footer id="tagline">
    No ads · No purchases · No timers · Just merge
  </footer>

  <!-- game over -->
  <div id="gameover" class="hidden">
    <div class="go-card">
      <div class="go-title">GALAXY FULL</div>
      <div class="go-score">SCORE</div>
      <div class="go-final" id="final-score">0</div>
      <div id="new-best" class="hidden">★ NEW BEST ★</div>
      <button id="restart">PLAY AGAIN</button>
      <div class="go-note">no “watch an ad to continue” — just play again, free</div>
    </div>
  </div>

  <script src="merge.js"></script>
</body>
</html>
