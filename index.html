<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0c080f" />
  <title>COSMIC MERGE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="merge.css" />
</head>
<body>
  <div id="stars"></div>

  <header id="hud">
    <div class="brand"><span class="orbit"></span>COSMIC&nbsp;MERGE</div>
    <div class="hud-stats">
      <div class="stat">
        <span class="hud-label">SCORE</span>
        <span class="hud-value" id="score">0</span>
      </div>
      <div class="stat secondary">
        <span class="hud-label">BEST</span>
        <span class="hud-value" id="best">0</span>
      </div>
      <div class="next-ring" title="Next">
        <canvas id="next-canvas" width="52" height="52"></canvas>
      </div>
      <button id="muteBtn" aria-label="Toggle sound">♪</button>
    </div>
  </header>

  <div id="combo"></div>

  <main id="stage">
    <canvas id="game"></canvas>
  </main>

  <footer id="tagline">FREE · NO ADS · NO TIMERS · NO CATCH</footer>

  <!-- game over -->
  <div id="gameover" class="hidden">
    <div class="go-card">
      <div class="go-title">GALAXY FULL</div>
      <div class="go-label">FINAL SCORE</div>
      <div class="go-final" id="final-score">0</div>
      <div id="new-best" class="hidden">NEW BEST</div>
      <button id="restart">PLAY AGAIN</button>
      <div class="go-note">Free. Always.</div>
    </div>
  </div>

  <div id="grain" aria-hidden="true"></div>

  <script src="merge.js"></script>
</body>
</html>
